name: Deploy pdfiuh Web to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl -L https://rustwasm.github.io/wasm-pack/installer/init.sh > wasm-pack-init.sh && chmod +x wasm-pack-init.sh && ./wasm-pack-init.sh

      - name: Build WASM Core
        working-directory: ./pdfiuh-core
        run: wasm-pack build --target web --out-dir ../pdfiuh-web/pkg

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './pdfiuh-web/package-lock.json'

      - name: Install dependencies
        working-directory: ./pdfiuh-web
        run: npm ci

      - name: Build Web App
        working-directory: ./pdfiuh-web
        run: npx vite build --base=/pdfiuh/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./pdfiuh-web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
